<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HealthTracker — Wireframe</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        keyframes: {
          'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          'slide-in-from-top-2': {
            '0%': { transform: 'translateY(-8px)' },
            '100%': { transform: 'translateY(0)' },
          },
        },
        animation: {
          'in': 'fade-in 200ms ease-out, slide-in-from-top-2 200ms ease-out',
        },
      },
    },
  };
</script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI",
      system-ui, Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* tailwindcss-animate compatibility shims used inline by the component */
  .animate-in { animation-duration: 200ms; animation-fill-mode: both; }
  .fade-in { animation-name: htFadeIn; }
  .slide-in-from-top-2 { animation-name: htFadeIn, htSlideTop; }
  @keyframes htFadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes htSlideTop { from { transform: translateY(-8px) } to { transform: translateY(0) } }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#020617] text-[#f1f5f9]">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

// --- Shared Components ---

const SidebarItem = ({ icon, label, active }) => (
  <button
    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all ${
      active
        ? 'bg-teal-500/15 text-teal-500 font-semibold'
        : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
    }`}
  >
    <span className="w-[18px] text-center flex-shrink-0 text-base">{icon}</span>
    <span>{label}</span>
  </button>
);

const Panel = ({ icon, title, subtitle, libTag, children }) => (
  <section className="flex flex-col gap-4 p-5 rounded-[18px] bg-slate-900 border border-slate-800">
    <div className="flex flex-wrap items-start justify-between gap-3">
      <div className="flex items-center gap-4">
        <div className="w-[48px] h-[48px] rounded-2xl bg-slate-800 border border-white/5 shadow-inner flex items-center justify-center text-2xl flex-shrink-0">
          {icon}
        </div>
        <div>
          <h1 className="text-xl md:text-2xl font-extrabold text-slate-100 tracking-tight m-0 leading-tight">{title}</h1>
          <div className="text-xs text-slate-400 mt-1 font-medium">{subtitle}</div>
        </div>
      </div>
      {libTag && (
        <span className="text-[10px] text-slate-500 uppercase tracking-widest bg-white/5 px-2.5 py-1 rounded-full mt-1">
          {libTag}
        </span>
      )}
    </div>
    <div className="pt-4 border-t border-slate-800">{children}</div>
  </section>
);

const Chip = ({ label, meta, selected, onClick }) => {
  const baseStyles =
    "flex flex-col items-center justify-center gap-0.5 p-3 min-w-[92px] rounded-2xl border-[1.5px] cursor-pointer transition-all";
  const stateStyles = selected
    ? "bg-teal-500/10 border-teal-500/60 text-teal-400 shadow-[inset_0_1px_0_rgba(255,255,255,0.06),_0_4px_12px_rgba(20,184,166,0.15)]"
    : "bg-slate-800 border-transparent text-slate-400 hover:border-slate-700 hover:text-slate-200";

  return (
    <div className={`${baseStyles} ${stateStyles}`} onClick={onClick}>
      <span className="text-sm font-semibold leading-tight">{label}</span>
      <span className={`text-[10px] ${selected ? 'text-teal-500/70' : 'text-slate-500'} mt-0.5`}>
        {meta}
      </span>
    </div>
  );
};

function App() {
  const [activeRoute, setActiveRoute] = useState('dashboard');
  const [workoutSelection, setWorkoutSelection] = useState({
    walk: true,
    kickboxing: false,
    weights: false,
  });
  const [sessions, setSessions] = useState([
    {
      id: 'chest-tris',
      title: 'Chest & Triceps',
      meta: '6 exercises · 8:30–9:15 am · done',
      status: 'done',
      statusLabel: 'Volume 4,820 lb',
    },
    {
      id: 'core',
      title: 'Core Burner',
      meta: '5 exercises · started 4:10 pm',
      status: 'in-progress',
      statusLabel: 'In progress',
    },
  ]);
  const removeSession = (id) => setSessions((prev) => prev.filter((s) => s.id !== id));

  // Calories ring percentage (320 / 2000 = 16%)
  const caloriesPct = 16;
  const ringStyle = {
    background: `conic-gradient(#14b8a6 0% ${caloriesPct}%, rgba(255,255,255,0.10) ${caloriesPct}% 100%)`,
  };

  return (
    <div className="min-h-screen bg-[#020617] text-[#f1f5f9] font-sans flex items-center justify-center p-4 md:p-8">
      {/* V2 Shell - Glass Backdrop */}
      <div
        className="w-full max-w-[1200px] rounded-[22px] border border-slate-800 overflow-hidden grid grid-cols-[220px_minmax(0,1fr)] min-h-[700px] shadow-2xl relative"
        style={{
          background: `
            radial-gradient(circle at 18% 12%, rgba(20,184,166,.12), transparent 38%),
            radial-gradient(circle at 88% 78%, rgba(249,115,22,.08), transparent 42%),
            radial-gradient(circle at 50% 50%, rgba(34,197,94,.05), transparent 60%),
            #020617
          `,
        }}
      >
        {/* Navigation Rail */}
        <aside className="bg-slate-900/60 backdrop-blur-xl border-r border-white/5 p-5 flex flex-col gap-1 z-10">
          <div className="text-[15px] font-bold text-slate-100 px-2.5 pb-4 tracking-tight">HealthTracker</div>

          <SidebarItem icon="🏠" label="Dashboard" active={activeRoute === 'dashboard'} />
          <SidebarItem icon="🍽️" label="Meals" />
          <SidebarItem icon="🥊" label="Workouts" />
          <SidebarItem icon="🌿" label="Cannabis" />
          <SidebarItem icon="📍" label="Work Locations" />

          <div className="flex-1" />

          <button className="flex items-center gap-2.5 px-3 pt-3 mt-1.5 border-t border-white/5 hover:opacity-80 transition-opacity">
            <span className="text-base">👤</span>
            <span className="text-sm text-slate-400">Asif</span>
            <span className="ml-auto text-xs text-slate-500">⌄</span>
          </button>
        </aside>

        {/* Main Dashboard View */}
        <main className="p-7 flex flex-col gap-5 overflow-y-auto z-10">
          {/* V2 Glass Profile Banner */}
          <section className="relative p-5 rounded-[18px] border border-white/10 flex items-center gap-5 flex-wrap bg-white/5 backdrop-blur-[28px]">
            <div className="w-[52px] h-[52px] rounded-2xl bg-gradient-to-br from-teal-400 to-teal-600 text-white font-bold text-[17px] flex items-center justify-center flex-shrink-0 shadow-[0_8px_24px_rgba(20,184,166,0.35)]">
              AH
            </div>

            <div className="flex flex-col gap-0.5 flex-1 min-w-[150px]">
              <div className="text-[17px] font-bold text-slate-100">Asif Hussain</div>
              <div className="text-xs text-slate-400">5'10" · 38 yrs · IF 14:00–18:00</div>
            </div>

            <div className="flex flex-col gap-0.5">
              <div className="text-[10px] text-slate-400 uppercase tracking-wider">Current</div>
              <div className="text-[17px] font-bold tabular-nums">182.4 lb</div>
            </div>

            <div className="flex flex-col gap-0.5">
              <div className="text-[10px] text-slate-400 uppercase tracking-wider">vs last wk</div>
              <div className="text-[17px] font-bold tabular-nums text-green-500">▼ 0.6</div>
            </div>

            <div className="flex flex-col gap-0.5">
              <div className="text-[10px] text-slate-400 uppercase tracking-wider">Goal</div>
              <div className="text-[17px] font-bold tabular-nums">175.0</div>
            </div>

            <div
              className="relative w-[72px] h-[72px] rounded-full flex items-center justify-center flex-shrink-0 ml-2"
              style={ringStyle}
            >
              <div className="absolute inset-[6px] bg-slate-900/60 backdrop-blur-[20px] rounded-full" />
              <span className="relative text-[15px] font-extrabold tabular-nums leading-none">{caloriesPct}%</span>
            </div>

            <div className="flex flex-col items-end gap-0.5 ml-1">
              <span className="text-[10px] text-slate-400 uppercase tracking-wider">Calories today</span>
              <span className="text-[17px] font-bold tabular-nums">320 / 2000</span>
              <span className="text-[10.5px] text-green-500">1680 remaining</span>
            </div>
          </section>

          {/* Compact Date Selector */}
          <section className="flex items-center justify-between px-4 py-2.5 bg-slate-900 border border-slate-800 rounded-2xl">
            <button className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">‹</button>
            <div className="flex flex-col items-center gap-px cursor-pointer">
              <div className="text-[10px] text-teal-500 uppercase tracking-widest font-semibold">Today</div>
              <div className="text-[15px] font-bold text-slate-100">Saturday · May 3</div>
            </div>
            <button className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">›</button>
          </section>

          {/* Spirituality Panel */}
          <Panel icon="🕌" title="Spirituality" subtitle="5 daily prayers · sticky chips" libTag="~/shared-services/prayer-times">
            <div className="flex flex-wrap gap-2.5">
              <Chip label="Fajr" meta="5:14 am" selected={true} />
              <Chip label="Zohr" meta="1:02 pm" selected={true} />
              <Chip label="Asr" meta="4:38 pm" selected={false} />
              <Chip label="Maghrib" meta="7:51 pm" selected={false} />
              <Chip label="Isha" meta="9:17 pm" selected={false} />
            </div>
          </Panel>

          {/* Workout Panel */}
          <Panel
            icon="🥊"
            title="Workout"
            subtitle="Walk · Kickboxing (5×/wk) · Weights (multi-session)"
            libTag="workoutLibrary.routines · title field"
          >
            <div className="flex flex-wrap gap-2.5 mb-3">
              <Chip
                label="Walk"
                meta="10 min · daily"
                selected={workoutSelection.walk}
                onClick={() => setWorkoutSelection((prev) => ({ ...prev, walk: !prev.walk }))}
              />
              <Chip
                label="Kickboxing"
                meta="2 / 5 wk"
                selected={workoutSelection.kickboxing}
                onClick={() => setWorkoutSelection((prev) => ({ ...prev, kickboxing: !prev.kickboxing }))}
              />
              <Chip
                label="Weights"
                meta="Select routine"
                selected={workoutSelection.weights}
                onClick={() => setWorkoutSelection((prev) => ({ ...prev, weights: !prev.weights }))}
              />
            </div>

            {/* Weights Routine Picker Dropdown */}
            {workoutSelection.weights && (
              <div className="mb-4 bg-slate-800 border border-slate-700 rounded-xl p-2 shadow-xl relative animate-in fade-in slide-in-from-top-2">
                <div className="text-[10px] text-slate-400 uppercase tracking-widest font-semibold px-2 pt-1 pb-2">
                  Select a Routine
                </div>
                <div className="flex flex-col gap-1">
                  {[
                    { title: 'Chest & Triceps', meta: '6 exercises · ~45 min' },
                    { title: 'Back & Biceps', meta: '6 exercises · ~45 min' },
                    { title: 'Shoulders', meta: '5 exercises · ~40 min' },
                    { title: 'Quads & Hamstrings', meta: '6 exercises · ~50 min' },
                  ].map((routine, idx) => (
                    <div
                      key={idx}
                      className="flex items-center justify-between p-2.5 rounded-lg hover:bg-slate-700/50 cursor-pointer border border-transparent hover:border-slate-600 transition-all group"
                    >
                      <div>
                        <div className="text-sm font-semibold text-slate-200 group-hover:text-teal-400 transition-colors">
                          {routine.title}
                        </div>
                        <div className="text-[10.5px] text-slate-400">{routine.meta}</div>
                      </div>
                      <button className="w-7 h-7 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center text-teal-500 font-bold group-hover:bg-teal-500 group-hover:text-white group-hover:border-teal-500 transition-colors">
                        +
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Session Tiles Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
              {sessions.map((s) => {
                const done = s.status === 'done';
                const tileCls = done
                  ? 'bg-teal-500/10 border border-teal-500/40 rounded-xl overflow-hidden'
                  : 'bg-slate-800 border border-orange-500/50 rounded-xl overflow-hidden';
                const iconCls = done
                  ? 'w-6 h-6 rounded-full bg-teal-500 flex items-center justify-center text-white text-[11px] font-bold'
                  : 'w-6 h-6 rounded-full bg-orange-500/20 border-2 border-orange-500 flex items-center justify-center text-orange-500 text-[11px] font-bold';
                const labelCls = done ? 'text-green-500 font-semibold' : 'text-orange-500 font-semibold';
                return (
                  <div key={s.id} className={tileCls}>
                    <div className="flex items-center justify-between p-3">
                      <div className="flex items-center gap-2.5 cursor-pointer min-w-0">
                        <div className={iconCls}>{done ? '✓' : '▶'}</div>
                        <div className="min-w-0">
                          <div className="text-sm font-semibold text-slate-100 truncate">{s.title}</div>
                          <div className="text-[10.5px] text-slate-400 mt-0.5 truncate">{s.meta}</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2 text-[11px] text-slate-400 flex-shrink-0">
                        <span className={labelCls}>{s.statusLabel}</span>
                        <button
                          type="button"
                          onClick={(e) => { e.stopPropagation(); removeSession(s.id); }}
                          aria-label={`Remove ${s.title}`}
                          title="Remove workout"
                          className="w-6 h-6 rounded-full bg-slate-900/80 border border-slate-700 flex items-center justify-center text-slate-400 hover:bg-red-500/15 hover:border-red-500/50 hover:text-red-400 transition-colors text-[14px] leading-none"
                        >
                          −
                        </button>
                        <span className="text-slate-500">›</span>
                      </div>
                    </div>
                  </div>
                );
              })}
              {sessions.length === 0 && (
                <div className="md:col-span-2 text-center text-[11px] text-slate-500 italic py-6 border border-dashed border-slate-700 rounded-xl">
                  No workouts logged yet — tap a chip above to add one.
                </div>
              )}
            </div>
          </Panel>

          {/* Cannabis Panel */}
          <Panel
            icon="🌿"
            title="Cannabis"
            subtitle="2 sessions · taper week 2 / 8 · 15 / 73 mg today"
            libTag="cannabisProducts · session planner"
          >
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div className="bg-slate-800 rounded-xl p-3.5 flex flex-col gap-2">
                <div className="flex items-center justify-between">
                  <div className="text-sm font-bold text-slate-100">2:30 pm</div>
                  <div className="text-[10px] px-2 py-1 rounded-full bg-slate-900 text-slate-400 uppercase tracking-wider">Edible</div>
                </div>
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px] flex-shrink-0">🍫</div>
                  <div>
                    <div className="text-[13.5px] font-semibold text-slate-100">Peanut Buddha Buddha</div>
                    <div className="text-[11px] text-slate-400 mt-0.5">½ piece · 25 mg · ⭐⭐⭐</div>
                  </div>
                </div>
                <button className="self-start px-3.5 py-1.5 rounded-full bg-teal-500/10 text-teal-400 border border-teal-500/30 text-[11.5px] font-semibold hover:bg-teal-500/20 transition-colors">
                  Log session
                </button>
              </div>

              <div className="bg-slate-800 rounded-xl p-3.5 flex flex-col gap-2">
                <div className="flex items-center justify-between">
                  <div className="text-sm font-bold text-slate-100">7:30 pm</div>
                  <div className="text-[10px] px-2 py-1 rounded-full bg-slate-900 text-slate-400 uppercase tracking-wider">Vape</div>
                </div>
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px] flex-shrink-0">💨</div>
                  <div>
                    <div className="text-[13.5px] font-semibold text-slate-100">Indica Cart</div>
                    <div className="text-[11px] text-slate-400 mt-0.5">2 puffs · ~6 mg · ⭐⭐</div>
                  </div>
                </div>
                <button className="self-start px-3.5 py-1.5 rounded-full bg-teal-500/10 text-teal-400 border border-teal-500/30 text-[11.5px] font-semibold hover:bg-teal-500/20 transition-colors">
                  Log session
                </button>
              </div>
            </div>
            <div className="text-[10.5px] text-slate-500 mt-3 text-center">
              Algorithm: favorites-weighted · onset back-scheduled from 8 pm bedtime · variety constraint (no same product back-to-back)
            </div>
          </Panel>

          {/* Food Panel */}
          <Panel
            icon="🍽️"
            title="Food"
            subtitle="Intermittent fasting · feeding window 2:00 – 6:00 pm"
            libTag="meals library · weekly auto-plan"
          >
            <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-2.5 px-3.5 flex items-center justify-between text-xs text-slate-200 flex-wrap gap-2 mb-3.5">
              <div className="flex items-center gap-2">
                <span className="bg-yellow-500 text-[#1a1300] font-bold px-2 py-0.5 rounded-full text-[10.5px] tracking-wider">FASTING</span>
                <span>Window opens in <strong className="text-slate-100">2h 14m</strong></span>
              </div>
              <div className="text-slate-400 text-[12px]">
                14:32 since last meal · <strong className="text-slate-200 font-semibold">96%</strong> 7-day adherence
              </div>
            </div>

            <div className="flex flex-col gap-2">
              {/* Eaten Meal */}
              <div className="grid grid-cols-[36px_1fr_110px_32px] gap-3 items-center p-3 rounded-xl bg-teal-500/10 border border-transparent">
                <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px]">🍳</div>
                <div>
                  <div className="text-[10px] text-slate-400 uppercase tracking-wider">Breakfast (pre-window)</div>
                  <div className="text-sm font-semibold text-slate-100 mt-px">Greek Yogurt Bowl</div>
                  <div className="text-[10.5px] text-slate-500 mt-0.5">eaten 8:30 am · before fast started</div>
                </div>
                <div className="flex items-center gap-1 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5">
                  <input
                    type="text"
                    defaultValue="320"
                    className="bg-transparent border-0 text-slate-100 w-12 text-right outline-none text-[13.5px] tabular-nums"
                  />
                  <span className="text-[11px] text-slate-400">cal</span>
                </div>
                <button className="w-[30px] h-[30px] bg-teal-500 border border-teal-500 rounded-full flex items-center justify-center text-white text-[13.5px] cursor-pointer">✓</button>
              </div>

              {/* Pending Meals */}
              {[
                { icon: '🥗', slot: 'Lunch · feeding window', name: 'Chicken & Rice', time: '2:00 pm', cal: '540' },
                { icon: '🍽️', slot: 'Dinner · feeding window', name: 'Salmon & Greens', time: '5:30 pm', cal: '620' },
                { icon: '🍿', slot: 'Snack · post-window', name: 'Almonds', time: 'window closed at 6 pm', cal: '170', dim: true },
                { icon: '🥤', slot: 'Shake · flex slot', name: 'Whey Shake', time: 'add anytime', cal: '180' },
              ].map((meal, idx) => (
                <div
                  key={idx}
                  className={`grid grid-cols-[36px_1fr_110px_32px] gap-3 items-center p-3 rounded-xl bg-slate-800 border border-transparent ${
                    meal.dim ? 'opacity-50' : ''
                  }`}
                >
                  <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px]">{meal.icon}</div>
                  <div>
                    <div className="text-[10px] text-slate-400 uppercase tracking-wider">{meal.slot}</div>
                    <div className="text-sm font-semibold text-slate-100 mt-px">{meal.name}</div>
                    <div className="text-[10.5px] text-slate-500 mt-0.5">{meal.time}</div>
                  </div>
                  <div className="flex items-center gap-1 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5">
                    <input
                      type="text"
                      placeholder={meal.cal}
                      className="bg-transparent border-0 text-slate-100 w-12 text-right outline-none text-[13.5px] tabular-nums placeholder-slate-500"
                    />
                    <span className="text-[11px] text-slate-400">cal</span>
                  </div>
                  <button className="w-[30px] h-[30px] bg-slate-900 border-[1.5px] border-slate-700 rounded-full flex items-center justify-center text-slate-500 text-[13.5px] cursor-pointer hover:border-slate-500 transition-colors">○</button>
                </div>
              ))}
            </div>

            <div className="text-[10.5px] text-slate-500 mt-2 text-center">
              Each calorie input sums into the profile-banner ring. Weekly plan auto-generated every Sunday from favorites; tap meal to swap.
            </div>
          </Panel>

          {/* Footer Action */}
          <section className="mt-2 flex items-center justify-center pb-6">
            <button className="px-9 py-3.5 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 text-white font-bold text-sm shadow-[0_10px_28px_rgba(20,184,166,0.35)] hover:scale-[1.02] active:scale-[0.98] transition-transform">
              ✓ Complete Day
            </button>
          </section>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
