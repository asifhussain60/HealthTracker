<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HealthTracker — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        keyframes: {
          'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          'slide-in-from-top-2': {
            '0%': { transform: 'translateY(-8px)' },
            '100%': { transform: 'translateY(0)' },
          },
        },
        animation: {
          'in': 'fade-in 200ms ease-out, slide-in-from-top-2 200ms ease-out',
        },
      },
    },
  };
</script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI",
      system-ui, Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* tailwindcss-animate compatibility shims used inline by the component */
  .animate-in { animation-duration: 200ms; animation-fill-mode: both; }
  .fade-in { animation-name: htFadeIn; }
  .slide-in-from-top-2 { animation-name: htFadeIn, htSlideTop; }
  @keyframes htFadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes htSlideTop { from { transform: translateY(-8px) } to { transform: translateY(0) } }

  /* Staggered panel entrance — fires when date changes */
  @keyframes htPanelIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ht-panel-enter {
    animation: htPanelIn 420ms cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .ht-panel-enter:nth-child(1) { animation-delay: 40ms; }
  .ht-panel-enter:nth-child(2) { animation-delay: 110ms; }
  .ht-panel-enter:nth-child(3) { animation-delay: 180ms; }
  .ht-panel-enter:nth-child(4) { animation-delay: 250ms; }
  .ht-panel-enter:nth-child(5) { animation-delay: 320ms; }

  /* Calendar dropdown */
  @keyframes htCalIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .ht-cal-enter { animation: htCalIn 200ms cubic-bezier(0.22, 1, 0.36, 1) both; transform-origin: top center; }

  /* Display font for section headers */
  .ht-display {
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    letter-spacing: -0.02em;
    font-feature-settings: "ss01", "ss02";
  }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#020617] text-[#f1f5f9]">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// --- Shared Components ---

const SidebarItem = ({ icon, label, active }) => (
  <button
    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all ${
      active
        ? 'bg-teal-500/15 text-teal-500 font-semibold'
        : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
    }`}
  >
    <span className="w-[18px] text-center flex-shrink-0 text-base">{icon}</span>
    <span>{label}</span>
  </button>
);

const Panel = ({ icon, title, subtitle, libTag, accent = 'teal', children }) => {
  return (
    <section className="ht-panel-enter relative flex flex-col gap-5 px-6 py-8 rounded-2xl bg-slate-950/60 ring-1 ring-inset ring-white/[0.03] transition-all duration-300">
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div className="flex items-center gap-4">
          <div className="w-[48px] h-[48px] rounded-2xl bg-slate-800 border border-white/5 shadow-inner flex items-center justify-center text-2xl flex-shrink-0">
            {icon}
          </div>
          <div>
            <h1 className="ht-display text-2xl md:text-[26px] font-bold text-slate-100 m-0 leading-tight">{title}</h1>
            <div className="text-xs text-slate-400 mt-1 font-medium">{subtitle}</div>
          </div>
        </div>
        {libTag && (
          <span className="text-[10px] text-slate-500 uppercase tracking-widest bg-white/5 px-2.5 py-1 rounded-full mt-1">
            {libTag}
          </span>
        )}
      </div>
      <div className="pt-5">{children}</div>
    </section>
  );
};

// --- Day Header (governs all panels below) ---

const DayHeader = ({
  currentDate, dayOffset, dateLabel, dateRel,
  onPrev, onNext, onToday, onPickDate,
  calendarOpen, setCalendarOpen,
}) => {
  const dayNamesShort = ['S','M','T','W','T','F','S'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const isToday = dayOffset === 0;

  // Build the week strip: 7 days centered on the current date (Sun..Sat of currentDate's week)
  const dow = currentDate.getDay();
  const weekStart = new Date(currentDate.getTime() - dow * 86400000);
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart.getTime() + i * 86400000);
    return d;
  });
  // Demo "completion dots" — random-looking but stable per day-of-month
  const completionFor = (d) => {
    const seed = d.getDate();
    return {
      prayer: seed % 5 >= 2,
      workout: seed % 3 === 0,
      cal: seed % 4 !== 1,
      fast: seed % 2 === 0,
    };
  };

  // Calendar dropdown month grid (driven by currentDate's month)
  const calYear = currentDate.getFullYear();
  const calMonth = currentDate.getMonth();
  const monthDays = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const todayDom = 3; // demo: May 3 is "today"

  return (
    <section className="sticky top-0 z-20 -mx-7 px-7 pt-1 pb-3 bg-gradient-to-b from-[#020617] via-[#020617]/95 to-transparent backdrop-blur-md">
      <div className="rounded-2xl bg-slate-900/90 border border-slate-800 shadow-[0_10px_30px_-12px_rgba(0,0,0,0.7)] backdrop-blur-xl overflow-hidden">

        {/* Row 1 — Date + nav controls */}
        <div className="flex items-center gap-3 px-4 py-3.5">
          <div className="flex flex-col leading-tight min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className="text-[11px] text-slate-400 uppercase tracking-[0.18em] font-semibold">
                {currentDate.toLocaleDateString('en-US', { weekday: 'long' })}
              </span>
              {isToday && (
                <span className="px-1.5 py-0.5 rounded-md text-[9.5px] font-bold uppercase tracking-wider bg-teal-500/15 text-teal-300 border border-teal-500/30">
                  Today
                </span>
              )}
            </div>
            <div className="text-[22px] font-bold text-slate-100 tracking-tight tabular-nums">
              {monthNames[calMonth]} {currentDate.getDate()}
              <span className="text-slate-500 font-medium ml-1.5 text-[14px]">{calYear}</span>
            </div>
          </div>

          <div className="flex items-center gap-1.5">
            {!isToday && (
              <button
                onClick={onToday}
                className="px-3 py-2 rounded-xl text-[11px] font-semibold uppercase tracking-wider text-teal-300 bg-teal-500/10 border border-teal-500/30 hover:bg-teal-500/20 hover:border-teal-500/50 transition-all"
              >
                Today
              </button>
            )}
            <div className="flex items-center bg-slate-800/60 border border-slate-700/60 rounded-xl">
              <button
                onClick={onPrev}
                aria-label="Previous day"
                className="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-700/60 rounded-l-xl transition-colors"
              >
                ‹
              </button>
              <div className="w-px h-5 bg-slate-700/80" />
              <button
                onClick={onNext}
                aria-label="Next day"
                className="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-700/60 rounded-r-xl transition-colors"
              >
                ›
              </button>
            </div>
            <button
              onClick={() => setCalendarOpen((v) => !v)}
              aria-label="Open calendar"
              aria-expanded={calendarOpen}
              className={`w-9 h-9 flex items-center justify-center rounded-xl border transition-all ${
                calendarOpen
                  ? 'bg-teal-500/15 border-teal-500/40 text-teal-300'
                  : 'bg-slate-800/60 border-slate-700/60 text-slate-400 hover:text-slate-100 hover:border-slate-600'
              }`}
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
            </button>
          </div>
        </div>

        {/* Row 2 — Week strip (tile-styled, current day enlarged) */}
        <div className="flex items-stretch gap-2 px-4 pb-4">
          {weekDays.map((d) => {
            const offsetFromCurrent = Math.round((d.getTime() - currentDate.getTime()) / 86400000);
            const isSelected = offsetFromCurrent === 0;
            const todayDate = new Date(2026, 4, 3);
            todayDate.setHours(0,0,0,0);
            const dNorm = new Date(d); dNorm.setHours(0,0,0,0);
            const isPast = dNorm.getTime() < todayDate.getTime();
            const isFuture = dNorm.getTime() > todayDate.getTime();
            const isWeekToday = dNorm.getTime() === todayDate.getTime();

            // Base tile (matches Chip styling)
            const base = "flex flex-col items-center justify-center rounded-2xl border-[1.5px] cursor-pointer transition-all flex-1";
            let state = "";
            if (isSelected) {
              // Active / contrasting background — solid teal fill
              state = "bg-teal-500 border-teal-400 text-white shadow-[0_8px_24px_-6px_rgba(20,184,166,0.55),inset_0_1px_0_rgba(255,255,255,0.2)] scale-[1.08] z-10 py-4 -my-1";
            } else if (isWeekToday) {
              state = "bg-teal-500/10 border-teal-500/60 text-teal-300 shadow-[inset_0_1px_0_rgba(255,255,255,0.06),0_4px_12px_-4px_rgba(20,184,166,0.25)] py-3";
            } else if (isPast) {
              state = "bg-slate-800/40 border-slate-800 text-slate-500 hover:border-slate-700 hover:text-slate-300 hover:bg-slate-800/70 py-3";
            } else if (isFuture) {
              state = "bg-transparent border-dashed border-slate-700/60 text-slate-400 hover:border-slate-600 hover:text-slate-200 hover:bg-slate-800/40 py-3";
            }

            const labelCls = isSelected
              ? "text-[10px] uppercase tracking-wider font-bold text-white/80"
              : isWeekToday
                ? "text-[10px] uppercase tracking-wider font-bold text-teal-300/80"
                : isPast
                  ? "text-[10px] uppercase tracking-wider font-semibold text-slate-600"
                  : "text-[10px] uppercase tracking-wider font-semibold text-slate-500";

            const numCls = isSelected
              ? "text-[20px] font-extrabold tabular-nums leading-none mt-1"
              : "text-[15px] font-bold tabular-nums leading-none mt-1";

            return (
              <button
                key={d.toISOString()}
                onClick={() => onPickDate(d)}
                aria-current={isSelected ? 'date' : undefined}
                className={`${base} ${state}`}
              >
                <span className={labelCls}>
                  {dayNamesShort[d.getDay()]}
                </span>
                <span className={numCls}>
                  {d.getDate()}
                </span>
              </button>
            );
          })}
        </div>

        {/* Calendar dropdown */}
        {calendarOpen && (
          <div className="ht-cal-enter border-t border-slate-800 p-4 bg-slate-900/60">
            <div className="flex items-center justify-between mb-3">
              <button className="w-8 h-8 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors">‹</button>
              <div className="text-sm font-bold text-slate-100">{monthNames[calMonth]} {calYear}</div>
              <button className="w-8 h-8 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors">›</button>
            </div>
            <div className="grid grid-cols-7 gap-1 mb-2">
              {days.map((d) => (
                <div key={d} className="text-[10px] text-slate-500 text-center font-semibold uppercase tracking-wider py-1">{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1">
              {Array.from({ length: firstDow }).map((_, i) => (
                <div key={`pad-${i}`} />
              ))}
              {Array.from({ length: monthDays }, (_, i) => i + 1).map((d) => {
                const dayDate = new Date(calYear, calMonth, d);
                const isCalToday = d === todayDom && calMonth === 4;
                const isSelectedDay = dayDate.toDateString() === currentDate.toDateString();
                return (
                  <button
                    key={d}
                    onClick={() => { onPickDate(dayDate); setCalendarOpen(false); }}
                    className={`aspect-square rounded-lg text-[12px] font-medium tabular-nums transition-all ${
                      isSelectedDay
                        ? 'bg-teal-500 text-white font-bold shadow-[0_4px_12px_rgba(20,184,166,0.4)]'
                        : isCalToday
                          ? 'text-teal-300 font-bold border border-teal-500/40 hover:bg-teal-500/10'
                          : 'text-slate-300 hover:bg-slate-800 hover:text-slate-100'
                    }`}
                  >
                    {d}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </section>
  );
};

const Chip = ({ label, meta, selected, onClick, theme = 'teal', badge }) => {
  const baseStyles =
    "relative flex flex-col items-center justify-center gap-0.5 p-3 min-w-[92px] rounded-2xl border-[1.5px] cursor-pointer transition-all";

  const themes = {
    teal: {
      selected:
        "bg-teal-500/10 border-teal-500/60 text-teal-400 shadow-[inset_0_1px_0_rgba(255,255,255,0.06),_0_4px_12px_rgba(20,184,166,0.15)]",
      idle:
        "bg-slate-800 border-transparent text-slate-400 hover:border-slate-700 hover:text-slate-200",
      metaSelected: "text-teal-500/70",
      metaIdle: "text-slate-500",
    },
    gold: {
      selected:
        "bg-gradient-to-br from-amber-400/15 to-yellow-600/10 border-amber-400/70 text-amber-300 shadow-[inset_0_1px_0_rgba(255,255,255,0.1),_0_0_24px_rgba(251,191,36,0.35),_0_4px_14px_-2px_rgba(217,119,6,0.4)]",
      idle:
        "bg-slate-900/50 border-slate-800 text-slate-600 opacity-60 hover:opacity-100 hover:border-amber-500/30 hover:text-amber-200/70 hover:bg-slate-800/60",
      metaSelected: "text-amber-300/80",
      metaIdle: "text-slate-600",
    },
  };

  const t = themes[theme] || themes.teal;
  const stateStyles = selected ? t.selected : t.idle;

  const badgeColors = {
    teal: "bg-teal-500 text-white shadow-[0_4px_14px_rgba(20,184,166,0.55)] hover:bg-teal-400 ring-2 ring-slate-900",
    orange: "bg-orange-500 text-white shadow-[0_4px_14px_rgba(249,115,22,0.55)] hover:bg-orange-400 ring-2 ring-slate-900",
  };

  return (
    <div className={`${baseStyles} ${stateStyles}`} onClick={onClick}>
      <span className="text-sm font-semibold leading-tight">{label}</span>
      <span className={`text-[10px] ${selected ? t.metaSelected : t.metaIdle} mt-0.5`}>
        {meta}
      </span>
      {badge && (
        <button
          type="button"
          onClick={(e) => { e.stopPropagation(); badge.onClick?.(); }}
          aria-label={badge.ariaLabel || `Edit ${label} value`}
          className={`absolute -top-2 -right-2 min-w-[28px] h-[22px] px-2 rounded-full text-[10.5px] font-bold tabular-nums leading-none flex items-center justify-center transition-all ${badgeColors[badge.color || 'teal']}`}
        >
          {badge.value}
        </button>
      )}
    </div>
  );
};

// --- Unified Workout Tile (Walk / Kickboxing / Weights / future workouts) ---

const WORKOUT_ACCENTS = {
  teal: {
    surface: 'bg-teal-500/[0.06] border-teal-500/50',
    glow: 'shadow-[0_8px_28px_-10px_rgba(20,184,166,0.45),inset_0_1px_0_rgba(255,255,255,0.04)]',
    iconBg: 'bg-teal-500/15 border-teal-500/30',
    text: 'text-teal-300',
    textSoft: 'text-teal-300/70',
    addBtn: 'border-teal-500/30 text-teal-300 hover:bg-teal-500/10 hover:border-teal-500/50',
    selDot: 'bg-teal-500 border-teal-400',
    statusDot: 'bg-teal-500 text-white',
  },
  orange: {
    surface: 'bg-orange-500/[0.06] border-orange-500/50',
    glow: 'shadow-[0_8px_28px_-10px_rgba(249,115,22,0.45),inset_0_1px_0_rgba(255,255,255,0.04)]',
    iconBg: 'bg-orange-500/15 border-orange-500/30',
    text: 'text-orange-300',
    textSoft: 'text-orange-300/70',
    addBtn: 'border-orange-500/30 text-orange-300 hover:bg-orange-500/10 hover:border-orange-500/50',
    selDot: 'bg-orange-500 border-orange-400',
    statusDot: 'bg-orange-500 text-white',
  },
  sky: {
    surface: 'bg-sky-500/[0.06] border-sky-500/50',
    glow: 'shadow-[0_8px_28px_-10px_rgba(14,165,233,0.45),inset_0_1px_0_rgba(255,255,255,0.04)]',
    iconBg: 'bg-sky-500/15 border-sky-500/30',
    text: 'text-sky-300',
    textSoft: 'text-sky-300/70',
    addBtn: 'border-sky-500/30 text-sky-300 hover:bg-sky-500/10 hover:border-sky-500/50',
    selDot: 'bg-sky-500 border-sky-400',
    statusDot: 'bg-sky-500 text-white',
  },
};

const STATUS_STYLES = {
  done:          { dot: 'bg-emerald-500 text-white',                                          glyph: '✓', label: 'text-emerald-400' },
  'in-progress': { dot: 'bg-orange-500/20 border-2 border-orange-500 text-orange-400',        glyph: '▶', label: 'text-orange-400' },
  logged:        { dot: 'bg-teal-500 text-white',                                             glyph: '✓', label: 'text-teal-400'    },
  pending:       { dot: 'bg-slate-800 border border-slate-700 text-slate-500',                glyph: '○', label: 'text-slate-500'   },
};

const WorkoutItem = ({ primary, secondary, status = 'pending', statusLabel, onClick, onRemove }) => {
  const s = STATUS_STYLES[status] || STATUS_STYLES.pending;
  return (
    <div
      onClick={onClick}
      className="group flex items-center gap-2.5 p-2.5 rounded-lg bg-slate-950/60 border border-slate-800 hover:border-slate-700 hover:bg-slate-900/80 cursor-pointer transition-all"
    >
      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold flex-shrink-0 ${s.dot}`}>{s.glyph}</div>
      <div className="flex-1 min-w-0">
        <div className="text-[12.5px] font-semibold text-slate-100 truncate leading-tight">{primary}</div>
        {secondary && <div className="text-[10px] text-slate-500 truncate mt-0.5 leading-tight">{secondary}</div>}
      </div>
      {statusLabel && <div className={`text-[10px] font-semibold tabular-nums ${s.label} flex-shrink-0`}>{statusLabel}</div>}
      {onRemove && (
        <button
          onClick={(e) => { e.stopPropagation(); onRemove(); }}
          aria-label="Remove entry"
          className="w-5 h-5 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center text-slate-500 opacity-0 group-hover:opacity-100 hover:border-red-500/50 hover:text-red-400 transition-all text-[13px] leading-none"
        >−</button>
      )}
    </div>
  );
};

const WorkoutTile = ({
  icon,
  label,
  subtitle,
  accent = 'teal',
  selected,
  onToggle,
  items = [],
  onItemClick,
  onItemRemove,
  addLabel = '+ Add',
  onAdd,
  emptyHint = 'No entries yet',
}) => {
  const a = WORKOUT_ACCENTS[accent] || WORKOUT_ACCENTS.teal;
  return (
    <div
      className={`relative flex flex-col rounded-2xl border p-5 min-h-[240px] transition-all duration-300 ${
        selected
          ? `${a.surface} ${a.glow}`
          : 'bg-slate-900/40 border-slate-800 hover:border-slate-700 hover:bg-slate-900/60'
      }`}
    >
      {/* Header: icon + label + selection dot */}
      <button onClick={onToggle} className="flex items-start gap-3 text-left w-full">
        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-[28px] flex-shrink-0 border transition-all ${
          selected ? a.iconBg : 'bg-slate-800 border-white/5'
        }`}>
          {icon}
        </div>
        <div className="flex-1 min-w-0 pt-1">
          <div className={`ht-display text-[18px] font-bold leading-tight tracking-tight ${selected ? 'text-slate-100' : 'text-slate-300'}`}>{label}</div>
          <div className={`text-[11px] mt-1 leading-snug ${selected ? a.textSoft : 'text-slate-500'}`}>{subtitle}</div>
        </div>
        <div className={`w-5 h-5 rounded-full border-[1.5px] flex items-center justify-center flex-shrink-0 mt-1 transition-all ${
          selected ? a.selDot : 'border-slate-600 bg-slate-900/60'
        }`}>
          {selected && <span className="text-white text-[10px] font-bold leading-none">✓</span>}
        </div>
      </button>

      {/* Body: items + add affordance */}
      {selected && (
        <div className="flex flex-col gap-2 mt-4 flex-1">
          {items.length === 0 ? (
            <div className="text-[11px] text-slate-500 italic text-center py-3 border border-dashed border-slate-800 rounded-lg">
              {emptyHint}
            </div>
          ) : (
            items.map((it) => (
              <WorkoutItem
                key={it.id}
                primary={it.primary}
                secondary={it.secondary}
                status={it.status}
                statusLabel={it.statusLabel}
                onClick={() => onItemClick?.(it)}
                onRemove={onItemRemove ? () => onItemRemove(it.id) : undefined}
              />
            ))
          )}
          {onAdd && (
            <button
              onClick={onAdd}

          )}

      )}
    </div>

};

                  </div>
                </div>
                <button className="self-start px-3.5 py-1.5 rounded-full bg-teal-500/10 text-teal-400 border border-teal-500/30 text-[11.5px] font-semibold hover:bg-teal-500/20 transition-colors">
                  Log session
                </button>
              </div>

              <div className="bg-slate-800 rounded-xl p-3.5 flex flex-col gap-2">
                <div className="flex items-center justify-between">
                  <div className="text-sm font-bold text-slate-100">7:30 pm</div>
                  <div className="text-[10px] px-2 py-1 rounded-full bg-slate-900 text-slate-400 uppercase tracking-wider">Vape</div>
                </div>
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px] flex-shrink-0">💨</div>
                  <div>
                    <div className="text-[13.5px] font-semibold text-slate-100">Indica Cart</div>
                    <div className="text-[11px] text-slate-400 mt-0.5">2 puffs · ~6 mg · ⭐⭐</div>
                  </div>
                </div>
                <button className="self-start px-3.5 py-1.5 rounded-full bg-teal-500/10 text-teal-400 border border-teal-500/30 text-[11.5px] font-semibold hover:bg-teal-500/20 transition-colors">
                  Log session
                </button>
              </div>
            </div>
            <div className="text-[10.5px] text-slate-500 mt-3 text-center">
              Algorithm: favorites-weighted · onset back-scheduled from 8 pm bedtime · variety constraint (no same product back-to-back)
            </div>
          </Panel>

          {/* Food Panel */}
          <Panel
            icon="🍽️"
            title="Food"
            subtitle="Intermittent fasting · feeding window 2:00 – 6:00 pm"
            libTag="meals library · weekly auto-plan"
            accent="amber"
          >
            <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-2.5 px-3.5 flex items-center justify-between text-xs text-slate-200 flex-wrap gap-2 mb-3.5">
              <div className="flex items-center gap-2">
                <span className="bg-yellow-500 text-[#1a1300] font-bold px-2 py-0.5 rounded-full text-[10.5px] tracking-wider">FASTING</span>
                <span>Window opens in <strong className="text-slate-100">2h 14m</strong></span>
              </div>
              <div className="text-slate-400 text-[12px]">
                14:32 since last meal · <strong className="text-slate-200 font-semibold">96%</strong> 7-day adherence
              </div>
            </div>

            <div className="flex flex-col gap-2">
              {/* Eaten Meal */}
              <div className="grid grid-cols-[36px_1fr_110px_32px] gap-3 items-center p-3 rounded-xl bg-teal-500/10 border border-transparent">
                <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px]">🍳</div>
                <div>
                  <div className="text-[10px] text-slate-400 uppercase tracking-wider">Breakfast (pre-window)</div>
                  <div className="text-sm font-semibold text-slate-100 mt-px">Greek Yogurt Bowl</div>
                  <div className="text-[10.5px] text-slate-500 mt-0.5">eaten 8:30 am · before fast started</div>
                </div>
                <div className="flex items-center gap-1 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5">
                  <input
                    type="text"
                    defaultValue="320"
                    className="bg-transparent border-0 text-slate-100 w-12 text-right outline-none text-[13.5px] tabular-nums"
                  />
                  <span className="text-[11px] text-slate-400">cal</span>
                </div>
                <button className="w-[30px] h-[30px] bg-teal-500 border border-teal-500 rounded-full flex items-center justify-center text-white text-[13.5px] cursor-pointer">✓</button>
              </div>

              {/* Pending Meals */}
              {[
                { icon: '🥗', slot: 'Lunch · feeding window', name: 'Chicken & Rice', time: '2:00 pm', cal: '540' },
                { icon: '🍽️', slot: 'Dinner · feeding window', name: 'Salmon & Greens', time: '5:30 pm', cal: '620' },
                { icon: '🍿', slot: 'Snack · post-window', name: 'Almonds', time: 'window closed at 6 pm', cal: '170', dim: true },
                { icon: '🥤', slot: 'Shake · flex slot', name: 'Whey Shake', time: 'add anytime', cal: '180' },
              ].map((meal, idx) => (
                <div
                  key={idx}
                  className={`grid grid-cols-[36px_1fr_110px_32px] gap-3 items-center p-3 rounded-xl bg-slate-800 border border-transparent ${
                    meal.dim ? 'opacity-50' : ''
                  }`}
                >
                  <div className="w-9 h-9 bg-slate-900 rounded-[9px] flex items-center justify-center text-[17px]">{meal.icon}</div>
                  <div>
                    <div className="text-[10px] text-slate-400 uppercase tracking-wider">{meal.slot}</div>
                    <div className="text-sm font-semibold text-slate-100 mt-px">{meal.name}</div>
                    <div className="text-[10.5px] text-slate-500 mt-0.5">{meal.time}</div>
                  </div>
                  <div className="flex items-center gap-1 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5">
                    <input
                      type="text"
                      placeholder={meal.cal}
                      className="bg-transparent border-0 text-slate-100 w-12 text-right outline-none text-[13.5px] tabular-nums placeholder-slate-500"
                    />
                    <span className="text-[11px] text-slate-400">cal</span>
                  </div>
                  <button className="w-[30px] h-[30px] bg-slate-900 border-[1.5px] border-slate-700 rounded-full flex items-center justify-center text-slate-500 text-[13.5px] cursor-pointer hover:border-slate-500 transition-colors">○</button>
                </div>
              ))}
            </div>

            <div className="text-[10.5px] text-slate-500 mt-2 text-center">
              Each calorie input sums into the profile-banner ring. Weekly plan auto-generated every Sunday from favorites; tap meal to swap.
            </div>
          </Panel>

          {/* Footer Action */}
          <section className="mt-2 flex items-center justify-center pb-6">
            <button className="px-9 py-3.5 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 text-white font-bold text-sm shadow-[0_10px_28px_rgba(20,184,166,0.35)] hover:scale-[1.02] active:scale-[0.98] transition-transform">
              ✓ Complete Day
            </button>
          </section>
          </div>{/* /panels-rekey wrapper */}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
